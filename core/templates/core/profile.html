{% extends 'core/base.html' %}

{% block title %}User Profile - Food Decision Engine{% endblock %}

{% block content %}
    <h1>User Profile</h1>
    <p>Tell us about yourself for more accurate analysis.</p>

    <form method="POST" action="{% url 'profile' %}">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" value="{{ profile.name }}" placeholder="e.g. John Doe">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" value="{{ profile.age }}" style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                    <option value="male" {% if profile.gender == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if profile.gender == 'female' %}selected{% endif %}>Female</option>
                    <option value="other" {% if profile.gender == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" step="0.1" id="weight" name="weight" value="{{ profile.weight }}" style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
            </div>
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" name="height" value="{{ profile.height }}" style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
            </div>
        </div>

        <button type="submit">Save & Continue to Meal Analysis</button>
    </form>

    <a href="{% url 'home' %}" class="btn-secondary">&larr; Back to Home</a>
{% endblock %}
